name: Test Editorial Generation

on:
  schedule:
    # Run daily at 2 AM Singapore Time (UTC+8) = 6 PM UTC
    - cron: '0 18 * * *'

  # Allow manual triggering from GitHub UI
  workflow_dispatch:

jobs:
  generate-editorial:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run offline unit tests (no API key needed)
        run: |
          python test_editorial_system.py

      - name: Run AI generation tests (requires ANTHROPIC_API_KEY)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python test_editorial_system.py --all

      - name: Upload generated editorials
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: editorial-content-${{ github.run_id }}
          path: |
            sample_editorial_output.json
            sample_tournament_review.json
            publishing_package_*.json
          retention-days: 30
